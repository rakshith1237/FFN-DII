name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: CI — 5 Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 1 — Install (npm ci)
        run: npm ci

      - name: 2 — Security audit (SCA)
        run: npm audit --audit-level=high || true

      - name: 3 — TypeScript check
        run: npx tsc --noEmit

      - name: 4 — Unit tests
        run: npx vitest run --passWithNoTests
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: 5 — SAST scan (Semgrep)
        run: |
          python3 -m pip install semgrep --quiet 2>/dev/null || pip install semgrep --quiet
          semgrep --config=.semgrep.yml src/ --error || true
